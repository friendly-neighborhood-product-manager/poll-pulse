<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PollPulse Vote</title>
  <link rel="stylesheet" href="assets/styles.css?v=10">
</head>
<body>
  <div class="app-shell vote-shell">
    <header class="app-header vote-header">
      <a class="brand" href="index.html">Poll<span>Pulse</span></a>
    </header>

    <main class="page vote-page">
      <section class="panel vote-panel">
        <p id="vote-session"></p>

        <div class="vote-meta-row">
          <span id="vote-status" class="vote-status-pill"></span>
          <span id="vote-countdown" class="vote-countdown-pill" aria-live="polite"></span>
        </div>

        <p id="vote-type"></p>
        <h1 id="vote-question">Loading question...</h1>

        <div id="vote-options" class="vote-options"></div>
        <p id="vote-message" class="vote-message"></p>
      </section>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
  <script src="assets/app.js?v=10"></script>
</body>
</html>
