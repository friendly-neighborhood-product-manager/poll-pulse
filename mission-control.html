<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PollPulse Mission Control</title>
  <link rel="stylesheet" href="assets/styles.css?v=10">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <a class="brand" href="index.html">Poll<span>Pulse</span></a>
      <nav class="nav-links" aria-label="Primary">
        <a id="mission-vote-link" href="vote.html?v=10">Vote</a>
        <a id="mission-slide-link" class="secondary" href="slide.html">Slide</a>
      </nav>
    </header>

    <main class="page">
      <section class="panel">
        <h1>Mission Control</h1>
        <p>Create a new polling session, edit an existing session, or delete a session from history.</p>

        <div class="session-admin-grid">
          <label>
            Admin action
            <select id="session-admin-action">
              <option value="create">Create a new session</option>
              <option value="edit">Edit an existing session</option>
              <option value="delete">Delete an existing session</option>
            </select>
          </label>

          <label id="existing-session-field">
            Existing session
            <select id="existing-session-select">
              <option value="">Loading sessions...</option>
            </select>
          </label>
        </div>

        <label>
          Session name
          <input id="session-name" type="text" placeholder="Product Team Check-in">
        </label>

        <div class="form-actions">
          <button class="button" id="save-session" type="button">Create Session</button>
          <button class="button danger" id="delete-session" type="button" hidden>Delete Session</button>
          <span id="session-save-status" class="save-status" role="status" aria-live="polite"></span>
        </div>
      </section>

      <section class="panel" id="active-session-panel" style="margin-top: 18px;">
        <h2>Current Session</h2>
        <p id="active-session-summary">Create or select a session to start.</p>
        <div class="form-actions">
          <a class="button secondary" id="active-slide-link" href="slide.html">Open Slide View</a>
          <a class="button secondary" id="active-vote-link" href="vote.html?v=10">Open Vote View</a>
        </div>
      </section>

      <section class="panel" id="question-editor-panel" style="margin-top: 18px;">
        <h2 id="question-form-title">Add Question</h2>

        <input id="editing-question-index" type="hidden" value="">

        <label>
          Question
          <input id="question-text" type="text" placeholder="What should we prioritize next?">
        </label>

        <label>
          Answer type
          <select id="question-type">
            <option value="single">Single-select</option>
            <option value="multi">Multi-select</option>
          </select>
        </label>

        <label>
          Options
          <textarea id="question-options" rows="5" placeholder="Option A&#10;Option B&#10;Option C"></textarea>
        </label>

        <div class="form-actions">
          <button class="button" id="add-question" type="button">Add Question</button>
          <button class="button secondary" id="cancel-edit" type="button" hidden>Cancel Edit</button>
          <span id="question-save-status" class="save-status" role="status" aria-live="polite"></span>
        </div>
      </section>

      <section class="panel" id="question-history-panel" style="margin-top: 18px;">
        <h2>Session Questions</h2>
        <div id="question-list"></div>
      </section>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
  <script src="assets/app.js?v=10"></script>
</body>
</html>
